# Kubernetes service for API
apiVersion: v1
kind: Service
metadata:
  name: churn-prediction-api-service
  labels:
    app: churn-prediction-api
spec:
  type: LoadBalancer  # Change to ClusterIP for internal-only access
  selector:
    app: churn-prediction-api
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

---
# Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: churn-prediction-api-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # TODO: Add rate limiting annotations
    # nginx.ingress.kubernetes.io/limit-rps: "100"
spec:
  ingressClassName: nginx
  rules:
  - host: api.churn-prediction.example.com  # TODO: Update with your domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: churn-prediction-api-service
            port:
              number: 80
  # TODO: Add TLS configuration
  # tls:
  # - hosts:
  #   - api.churn-prediction.example.com
  #   secretName: tls-secret

---
# Service for PostgreSQL (if deployed in cluster)
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  labels:
    app: postgres
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres

---
# Service for MLflow
apiVersion: v1
kind: Service
metadata:
  name: mlflow-service
  labels:
    app: mlflow
spec:
  type: ClusterIP
  selector:
    app: mlflow
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP
    name: http

---
# Service for Redis
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  labels:
    app: redis
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
    name: redis
