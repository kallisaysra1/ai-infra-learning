apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: model-server-ingress
  namespace: model-serving
  annotations:
    # NGINX Ingress Controller annotations
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "100"

    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"

    # Body size
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

    # TODO: Add cert-manager annotation for TLS
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # TODO: Add authentication annotations if needed
    # nginx.ingress.kubernetes.io/auth-type: basic
    # nginx.ingress.kubernetes.io/auth-secret: basic-auth
spec:
  ingressClassName: nginx

  # TODO: Configure TLS
  # tls:
  # - hosts:
  #   - model-server.example.com
  #   secretName: model-server-tls

  rules:
  - host: model-server.local  # TODO: Update with actual domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: model-server
            port:
              number: 80

      # Separate path for metrics (optional, for external access)
      - path: /metrics
        pathType: Exact
        backend:
          service:
            name: model-server
            port:
              number: 9090
