apiVersion: v1
kind: Service
metadata:
  name: model-server
  namespace: model-serving
  labels:
    app: model-server
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
spec:
  type: ClusterIP
  selector:
    app: model-server
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: http
  - name: metrics
    protocol: TCP
    port: 9090
    targetPort: 8000
  sessionAffinity: None

---
# Headless service for StatefulSet (if needed)
apiVersion: v1
kind: Service
metadata:
  name: model-server-headless
  namespace: model-serving
  labels:
    app: model-server
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: model-server
  ports:
  - name: http
    protocol: TCP
    port: 8000
    targetPort: http
