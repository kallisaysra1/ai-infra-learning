[pytest]
# Pytest configuration

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options
# Uncomment when running with coverage
# addopts =
#     --cov=src
#     --cov-report=term-missing
#     --cov-report=html
#     --cov-report=xml
#     --cov-fail-under=80

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    load: Load tests
    slow: Slow-running tests
    requires_docker: Tests that require Docker
    requires_k8s: Tests that require Kubernetes

# Asyncio mode
asyncio_mode = auto

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout (in seconds)
timeout = 300

# Ignore paths
norecursedirs = .git .tox dist build *.egg venv
